name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build and Release
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86, arm64]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Remove Existing Workloads
      run: |
        dotnet workload clean
        
    - name: Install Correct Workloads
      run: |
        dotnet workload install wasm-tools --skip-manifest-update
        
    - name: Restore dependencies
      run: dotnet restore NetVanguard.sln
      
    - name: Publish Daemon (${{ matrix.arch }})
      run: dotnet publish NetVanguard.Daemon/NetVanguard.Daemon.csproj -c Release -r win-${{ matrix.arch }} --self-contained true -p:PublishSingleFile=true -o publish/daemon-${{ matrix.arch }}

    - name: Publish App (${{ matrix.arch }})
      run: dotnet publish NetVanguard.App/NetVanguard.App.csproj -c Release -r win-${{ matrix.arch }} --self-contained true -p:PublishSingleFile=true -o publish/app-${{ matrix.arch }}

    - name: Create Zip Archive
      run: |
        mkdir NetVanguard-${{ matrix.arch }}
        cp -r publish/daemon-${{ matrix.arch }}/* NetVanguard-${{ matrix.arch }}/
        cp -r publish/app-${{ matrix.arch }}/* NetVanguard-${{ matrix.arch }}/
        Compress-Archive -Path NetVanguard-${{ matrix.arch }} -DestinationPath NetVanguard-${{ matrix.arch }}.zip

    - name: Release Note Generation
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: NetVanguard-${{ matrix.arch }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
